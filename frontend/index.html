<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Alpha Intelligence</title>
    <link rel="stylesheet" href="/frontend/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="terminal-header">
            <div class="logo">
                <span class="logo-icon">⚛</span>
                <h1>Quantum Alpha Intelligence</h1>
            </div>
            <div class="header-meta">
                <span class="status-indicator active"></span>
                <span id="last-updated">Initializing...</span>
            </div>
        </header>

        <!-- Main Dashboard Grid -->
        <main class="dashboard-grid">
            <!-- Sector Overview Panel -->
            <section class="panel sector-overview">
                <h2 class="panel-title">Sector Pulse</h2>
                <div id="sector-sentiment" class="sentiment-gauge">
                    <!-- Sector-wide sentiment visualization -->
                </div>
            </section>

            <!-- Signal Feed Panel -->
            <section class="panel signal-feed">
                <h2 class="panel-title">Live Signals</h2>
                <div id="signal-list" class="signal-list">
                    <!-- Real-time signal entries -->
                </div>
            </section>

            <!-- Ticker Heatmap Panel -->
            <section class="panel ticker-heatmap">
                <h2 class="panel-title">Quantum Universe</h2>
                <div id="heatmap" class="heatmap-grid">
                    <!-- Ticker sentiment heatmap -->
                </div>
            </section>

            <!-- Daily Briefing Panel -->
            <section class="panel daily-briefing">
                <h2 class="panel-title">Daily Briefing</h2>
                <div id="briefing-content" class="briefing-content">
                    <!-- Analyst narrative content -->
                </div>
            </section>

            <!-- Chart Panel -->
            <section class="panel chart-panel">
                <h2 class="panel-title">Signal History</h2>
                <canvas id="signal-chart"></canvas>
            </section>

            <!-- Interactive Analysis Panel -->
            <section class="panel analysis-panel">
                <h2 class="panel-title">Analyze</h2>
                <textarea id="news-input" placeholder="Paste a news article or press release to analyze..."></textarea>
                <button id="analyze-btn" class="btn-primary">Extract Signals</button>
                <div id="analysis-result" class="analysis-result">
                    <!-- Analysis output -->
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="/frontend/js/app.js"></script>
</body>
</html>
